<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>找找看「縮頭烏龜」在哪裡？</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overscroll-behavior-y: none;
            /* 現代科技感深色背景 */
            background: linear-gradient(135deg, #020617 0%, #0f172a 50%, #1e1b4b 100%);
            overflow-x: hidden;
        }
        
        /* 科技感透明立體畫板 */
        #board {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: flex-start;
            gap: 2px;
            padding: 6px;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            height: 70vh;
            overflow-y: auto;
            /* 科技透明感 (Tech Glassmorphism) */
            background-color: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(34, 211, 238, 0.3);
            border-radius: 1rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6), 0 0 20px rgba(34, 211, 238, 0.15), inset 0 0 15px rgba(34, 211, 238, 0.1);
            position: relative;
            z-index: 10;
        }

        #board::-webkit-scrollbar { width: 6px; }
        #board::-webkit-scrollbar-thumb { background-color: rgba(34,211,238,0.4); border-radius: 10px; }

        /* 外層容器負責旋轉與定位 */
        .animal-container {
            width: 40px; /* 從 32px 再放大為 40px，讓烏龜更大更清楚 */
            height: 40px; /* 從 32px 再放大為 40px */
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.3s;
        }

        /* 內層 SVG 負責上下漂浮動畫，讓畫面看起來像活的水族箱 */
        .turtle-svg-wrapper {
            width: 100%;
            height: 100%;
            animation: float 3s ease-in-out infinite;
            /* 給每個烏龜一點隨機的動畫延遲，才不會一起上下動 */
            animation-delay: var(--delay); 
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-3px); }
        }

        /* 點錯時的震動與淡出動畫 */
        .wrong-click {
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
            opacity: 0.3;
            pointer-events: none;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-2px, 0, 0); }
            40%, 60% { transform: translate3d(2px, 0, 0); }
        }

        /* 科技感漂浮粒子 (取代泡泡) */
        .bubbles {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none;
        }
        .bubble {
            position: absolute; bottom: -20px;
            background: #22d3ee;
            border-radius: 50%;
            box-shadow: 0 0 10px #22d3ee, 0 0 20px #0ea5e9;
            animation: rise 10s infinite linear;
            opacity: 0.6;
        }
        @keyframes rise {
            0% { bottom: -20px; transform: translateX(0) scale(0); opacity: 0; }
            10% { opacity: 0.8; transform: scale(1); }
            50% { transform: translateX(20px) scale(1.2); }
            90% { opacity: 0.8; }
            100% { bottom: 100vh; transform: translateX(-20px) scale(0.5); opacity: 0; }
        }

        /* 平面純白字體與金色邊緣發光 */
        .title-glow {
            color: #ffffff; /* 顯眼明晰的純白色 */
            animation: neonPulseGoldFlat 1.5s ease-in-out infinite alternate; /* 金色邊緣呼吸發光動畫 */
        }

        @keyframes neonPulseGoldFlat {
            from {
                text-shadow:
                    0 0 5px rgba(250, 204, 21, 0.8),
                    0 0 10px rgba(234, 179, 8, 0.6),
                    0 0 15px rgba(202, 138, 4, 0.5);
            }
            to {
                text-shadow:
                    0 0 10px #fde047,
                    0 0 20px #facc15,
                    0 0 30px #eab308,
                    0 0 40px #ca8a04;
            }
        }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen py-4 px-3 text-cyan-50">

    <!-- 背景粒子 -->
    <div class="bubbles" id="bubblesContainer"></div>

    <header class="text-center mb-3 w-full max-w-md z-10">
        <div class="flex justify-between items-end mb-2 px-2">
            <!-- 套用全新的平面金色發光樣式 -->
            <h1 class="text-2xl font-black title-glow tracking-wide">找找看【縮頭烏龜】在哪裡？ 🐢</h1>
            <div class="text-xs font-bold bg-slate-800/60 px-3 py-1 rounded-full backdrop-blur-md border border-cyan-500/50 shadow-[0_0_10px_rgba(34,211,238,0.2)]">
                關卡: <span id="levelDisplay" class="text-cyan-300 text-lg">1</span>
            </div>
        </div>
        
        <div class="flex items-center justify-between gap-3 px-2">
            <div class="flex gap-2">
                <div class="text-xs font-bold bg-slate-800/60 border border-cyan-500/30 text-cyan-200 px-3 py-1.5 rounded-lg shadow-[0_0_10px_rgba(0,0,0,0.5)] flex flex-col items-center backdrop-blur-md">
                    <span>時間</span>
                    <span id="time" class="text-lg leading-none mt-1 text-white text-shadow-sm">0.00</span>
                </div>
                <div class="text-xs font-bold bg-slate-900/60 border border-purple-500/30 text-purple-200 px-3 py-1.5 rounded-lg shadow-[0_0_10px_rgba(0,0,0,0.5)] flex flex-col items-center backdrop-blur-md">
                    <span class="text-purple-300">最佳紀錄</span>
                    <span id="bestTime" class="text-white text-lg leading-none mt-1">--</span>
                </div>
            </div>
            
            <button id="resetBtn" class="bg-gradient-to-r from-cyan-600 to-blue-700 hover:from-cyan-500 hover:to-blue-600 text-white text-sm font-black py-2 px-4 rounded-xl transition-transform active:scale-90 shadow-[0_0_15px_rgba(34,211,238,0.4)] border-b-4 border-blue-900">
                重玩本關
            </button>
        </div>
    </header>

    <!-- 遊戲畫板 -->
    <div id="board"></div>

    <!-- 華麗的勝利彈窗 (預設隱藏) -->
    <div id="winModal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-md hidden items-center justify-center z-50 transition-opacity opacity-0 duration-300">
        <div id="modalContent" class="bg-slate-900 rounded-3xl p-6 md:p-8 text-center shadow-[0_0_40px_rgba(34,211,238,0.3)] transform scale-50 transition-transform duration-500 max-w-sm w-[90%] border border-cyan-500/50 relative overflow-hidden">
            <!-- 裝飾光芒 -->
            <div class="absolute -top-10 -left-10 w-40 h-40 bg-cyan-500 rounded-full blur-[60px] opacity-30"></div>
            <div class="absolute -bottom-10 -right-10 w-40 h-40 bg-purple-500 rounded-full blur-[60px] opacity-30"></div>
            
            <h2 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-300 to-purple-400 mb-2 relative z-10 drop-shadow-[0_0_5px_rgba(34,211,238,0.5)]">太棒了！🎉</h2>
            <p id="modalLevelText" class="text-cyan-200 font-bold mb-3 relative z-10">成功通過第 1 關</p>
            
            <div id="starsDisplay" class="text-5xl mb-4 tracking-widest relative z-10 drop-shadow-[0_0_10px_rgba(253,224,71,0.8)]">⭐⭐⭐</div>
            
            <div class="bg-slate-800/80 rounded-xl p-4 mb-5 relative z-10 border border-cyan-500/30">
                <p class="text-cyan-300 font-bold text-sm mb-1">你的時間</p>
                <p class="text-3xl font-black text-white drop-shadow-[0_0_8px_rgba(255,255,255,0.5)]"><span id="finalTime"></span><span class="text-lg"> 秒</span></p>
                <p id="newRecordBadge" class="text-xs text-slate-900 font-bold bg-cyan-400 px-3 py-1 rounded-full inline-block mt-2 hidden animate-pulse shadow-[0_0_10px_rgba(34,211,238,0.8)]">🔥 新紀錄！</p>
            </div>
            
            <button id="nextLevelBtn" class="bg-gradient-to-r from-cyan-500 to-purple-600 text-white font-black py-3 px-8 rounded-full text-lg w-full transition-transform active:scale-95 shadow-[0_0_20px_rgba(168,85,247,0.5)] border-b-4 border-purple-900 relative z-10">
                前往下一關 ➡️
            </button>
        </div>
    </div>

    <script>
        const board = document.getElementById('board');
        const timeDisplay = document.getElementById('time');
        const bestTimeDisplay = document.getElementById('bestTime');
        const levelDisplay = document.getElementById('levelDisplay');
        const resetBtn = document.getElementById('resetBtn');
        
        // Modal Elements
        const winModal = document.getElementById('winModal');
        const modalContent = document.getElementById('modalContent');
        const finalTimeDisplay = document.getElementById('finalTime');
        const starsDisplay = document.getElementById('starsDisplay');
        const modalLevelText = document.getElementById('modalLevelText');
        const nextLevelBtn = document.getElementById('nextLevelBtn');
        const newRecordBadge = document.getElementById('newRecordBadge');

        // 遊戲狀態與關卡設定
        let gameActive = false;
        let startTime = 0;
        let timerInterval = null;
        let currentLevel = 1;
        
        // 關卡難度曲線 (第1關50隻，第5關555隻)
        const getTurtleCount = (level) => {
            const counts = [0, 50, 150, 250, 350, 555];
            return level <= 5 ? counts[level] : 555 + (level - 5) * 50; // 第6關以後繼續慢慢增加
        };

        // 共用 3D 科技漸層定義
        const svgDefs = `
            <defs>
                <radialGradient id="shell3D" cx="30%" cy="30%" r="70%">
                    <stop offset="0%" stop-color="#22d3ee" /> <!-- 亮青色 -->
                    <stop offset="80%" stop-color="#0284c7" /> <!-- 深藍 -->
                    <stop offset="100%" stop-color="#082f49" />
                </radialGradient>
                <radialGradient id="innerShell3D" cx="40%" cy="40%" r="60%">
                    <stop offset="0%" stop-color="#0ea5e9" />
                    <stop offset="100%" stop-color="#0c4a6e" />
                </radialGradient>
                <radialGradient id="limb3D" cx="30%" cy="30%" r="70%">
                    <stop offset="0%" stop-color="#94a3b8" />
                    <stop offset="100%" stop-color="#1e293b" />
                </radialGradient>
                <radialGradient id="head3D" cx="30%" cy="30%" r="70%">
                    <stop offset="0%" stop-color="#38bdf8" />
                    <stop offset="100%" stop-color="#0f172a" />
                </radialGradient>
            </defs>
        `;

        // 正常烏龜 SVG (3D科技立體版)
        const normalTurtleSVG = `
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" class="w-full h-full drop-shadow-[0_4px_4px_rgba(0,0,0,0.6)]">
            ${svgDefs}
            <circle cx="20" cy="25" r="14" fill="url(#limb3D)"/>
            <circle cx="80" cy="25" r="14" fill="url(#limb3D)"/>
            <circle cx="20" cy="75" r="14" fill="url(#limb3D)"/>
            <circle cx="80" cy="75" r="14" fill="url(#limb3D)"/>
            <polygon points="50,95 35,75 65,75" fill="url(#limb3D)"/>
            
            <circle cx="50" cy="12" r="15" fill="url(#head3D)"/>
            <circle cx="44" cy="8" r="2.5" fill="#e0f2fe"/><circle cx="56" cy="8" r="2.5" fill="#e0f2fe"/>
            <circle cx="44" cy="8" r="1.5" fill="#0ea5e9"/><circle cx="56" cy="8" r="1.5" fill="#0ea5e9"/>
            
            <ellipse cx="50" cy="55" rx="36" ry="42" fill="url(#shell3D)"/>
            <ellipse cx="50" cy="55" rx="26" ry="32" fill="url(#innerShell3D)"/>
            <path d="M 30 35 Q 50 15 70 35" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="3" stroke-linecap="round"/>
        </svg>`;

        // 縮頭烏龜 SVG (3D科技立體版)
        const headlessTurtleSVG = `
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" class="w-full h-full drop-shadow-[0_4px_4px_rgba(0,0,0,0.6)]">
            ${svgDefs}
            <circle cx="20" cy="25" r="14" fill="url(#limb3D)"/>
            <circle cx="80" cy="25" r="14" fill="url(#limb3D)"/>
            <circle cx="20" cy="75" r="14" fill="url(#limb3D)"/>
            <circle cx="80" cy="75" r="14" fill="url(#limb3D)"/>
            <polygon points="50,95 35,75 65,75" fill="url(#limb3D)"/>
            
            <ellipse cx="50" cy="55" rx="36" ry="42" fill="url(#shell3D)"/>
            <ellipse cx="50" cy="55" rx="26" ry="32" fill="url(#innerShell3D)"/>
            <path d="M 30 35 Q 50 15 70 35" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="3" stroke-linecap="round"/>
        </svg>`;

        // 產生背景泡泡
        function createBubbles() {
            const container = document.getElementById('bubblesContainer');
            container.innerHTML = '';
            for (let i = 0; i < 15; i++) {
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                const size = Math.random() * 20 + 5;
                bubble.style.width = `${size}px`;
                bubble.style.height = `${size}px`;
                bubble.style.left = `${Math.random() * 100}%`;
                bubble.style.animationDuration = `${Math.random() * 10 + 5}s`;
                bubble.style.animationDelay = `${Math.random() * 5}s`;
                container.appendChild(bubble);
            }
        }

        // 讀取/更新最高紀錄
        function updateBestTimeUI() {
            const best = localStorage.getItem(`turtleBest_lvl${currentLevel}`);
            if (best) {
                bestTimeDisplay.textContent = parseFloat(best).toFixed(2);
            } else {
                bestTimeDisplay.textContent = "--";
            }
        }

        function updateTime() {
            if (!gameActive) return;
            const now = Date.now();
            const timeElapsed = (now - startTime) / 1000;
            timeDisplay.textContent = timeElapsed.toFixed(2);
        }

        // 星級計算邏輯
        function calculateStars(timeElapsed, level) {
            // 基礎容許時間：每增加一關多給 2.5 秒挑戰三星
            const threeStarTarget = 3 + (level * 2.5); 
            if (timeElapsed <= threeStarTarget) return "⭐⭐⭐";
            if (timeElapsed <= threeStarTarget * 1.8) return "⭐⭐";
            return "⭐";
        }

        // 顯示勝利彈窗
        function showWin(timeElapsed) {
            gameActive = false;
            clearInterval(timerInterval);
            
            const timeStr = timeElapsed.toFixed(2);
            finalTimeDisplay.textContent = timeStr;
            modalLevelText.textContent = `成功通過第 ${currentLevel} 關`;
            starsDisplay.textContent = calculateStars(timeElapsed, currentLevel);
            
            // 檢查與儲存最高紀錄
            const savedBest = localStorage.getItem(`turtleBest_lvl${currentLevel}`);
            if (!savedBest || timeElapsed < parseFloat(savedBest)) {
                localStorage.setItem(`turtleBest_lvl${currentLevel}`, timeElapsed);
                newRecordBadge.classList.remove('hidden');
            } else {
                newRecordBadge.classList.add('hidden');
            }
            
            updateBestTimeUI();

            // 顯示動畫
            winModal.classList.remove('hidden');
            // 延遲一點點讓 display:block 生效後再加 opacity
            setTimeout(() => {
                winModal.classList.remove('opacity-0');
                modalContent.classList.remove('scale-50');
                modalContent.classList.add('scale-100');
            }, 10);
        }

        // 隱藏勝利彈窗
        function hideWin() {
            winModal.classList.add('opacity-0');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-50');
            setTimeout(() => {
                winModal.classList.add('hidden');
            }, 300);
        }

        function createTurtle(index, isTarget) {
            const container = document.createElement('div');
            container.className = 'animal-container';
            const randomRotation = Math.floor(Math.random() * 360);
            container.style.transform = `rotate(${randomRotation}deg)`;

            // 內層包裹 SVG，用於漂浮動畫
            const wrapper = document.createElement('div');
            wrapper.className = 'turtle-svg-wrapper';
            // 給每個烏龜隨機的動畫延遲，產生錯落有致的漂浮感
            wrapper.style.setProperty('--delay', `${(Math.random() * 2).toFixed(2)}s`);
            wrapper.innerHTML = isTarget ? headlessTurtleSVG : normalTurtleSVG;
            
            container.appendChild(wrapper);

            container.onclick = () => {
                if (!gameActive) return;

                if (isTarget) {
                    // 找到目標的特效
                    container.style.transform = "scale(2.5)"; 
                    container.style.filter = "drop-shadow(0 0 25px #22d3ee) brightness(1.5)"; 
                    container.style.zIndex = "20";
                    wrapper.style.animation = "none"; // 停止漂浮
                    
                    const timeElapsed = (Date.now() - startTime) / 1000;
                    setTimeout(() => showWin(timeElapsed), 400);

                } else {
                    // 點錯的震動特效
                    container.classList.add('wrong-click');
                    // 讓震動動畫結束後可以再次觸發（如果需要的話），但目前設定為點錯就變透明
                }
            };

            return container;
        }

        function initGame() {
            hideWin();
            board.innerHTML = '';
            levelDisplay.textContent = currentLevel;
            updateBestTimeUI();
            
            const count = getTurtleCount(currentLevel);
            
            gameActive = true;
            startTime = Date.now();
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(updateTime, 10);
            timeDisplay.textContent = "0.00";

            const targetIndex = Math.floor(Math.random() * count);
            const fragment = document.createDocumentFragment();
            
            for (let i = 0; i < count; i++) {
                fragment.appendChild(createTurtle(i, targetIndex === i));
            }
            
            board.appendChild(fragment);
            
            // 讓畫板每次都滾動回最上方
            board.scrollTop = 0;
        }

        // 事件綁定
        resetBtn.addEventListener('click', () => initGame());
        
        nextLevelBtn.addEventListener('click', () => {
            currentLevel++;
            initGame();
        });

        // 初始化
        window.onload = () => {
            createBubbles();
            initGame();
        };
    </script>
</body>
</html>
